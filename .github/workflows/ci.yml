name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Check gofmt
        run: test -z "$(gofmt -l git safety cmd)"

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test -race -count=1 ./...

  wrappers:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build git-harness CLI binary once
        run: go build -o ./bin/git-harness-cli ./cmd/git-harness-cli

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Run Python wrapper tests
        env:
          GIT_HARNESS_CLI: ./bin/git-harness-cli
        run: |
          cd wrappers/python
          python -m pip install -e ".[dev]"
          python -m pytest tests/ -v

      - name: Run Python sample smoke implementations
        env:
          GIT_HARNESS_CLI: ./bin/git-harness-cli
        run: |
          cd wrappers/python
          python -m samples.smoke_repo_flow
          python -m samples.smoke_safety_flow

      - name: Run Java wrapper tests
        env:
          GIT_HARNESS_CLI: ./bin/git-harness-cli
        run: |
          cd wrappers/java
          mvn test

      - name: Run Java sample smoke implementations
        env:
          GIT_HARNESS_CLI: ./bin/git-harness-cli
        run: |
          cd wrappers/java
          mvn -Dtest=SampleRepoFlowSmoke,SampleSafetyFlowSmoke test

  wrapper-cross-platform:
    runs-on: ${{ matrix.os }}
    needs: test
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build git-harness CLI binary once
        shell: bash
        run: |
          mkdir -p bin
          if [[ "${{ matrix.os }}" == "windows-latest" ]]; then
            go build -o ./bin/git-harness-cli.exe ./cmd/git-harness-cli
          else
            go build -o ./bin/git-harness-cli ./cmd/git-harness-cli
          fi

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Run Python wrapper smoke tests
        shell: bash
        env:
          GIT_HARNESS_CLI: ${{ matrix.os == 'windows-latest' && './bin/git-harness-cli.exe' || './bin/git-harness-cli' }}
        run: |
          cd wrappers/python
          python -m pip install -e ".[dev]"
          python -m pytest tests/ -v

      - name: Run Python sample smoke implementations
        shell: bash
        env:
          GIT_HARNESS_CLI: ${{ matrix.os == 'windows-latest' && './bin/git-harness-cli.exe' || './bin/git-harness-cli' }}
        run: |
          cd wrappers/python
          python -m samples.smoke_repo_flow
          python -m samples.smoke_safety_flow

      - name: Run Java wrapper smoke tests
        shell: bash
        env:
          GIT_HARNESS_CLI: ${{ matrix.os == 'windows-latest' && './bin/git-harness-cli.exe' || './bin/git-harness-cli' }}
        run: |
          cd wrappers/java
          mvn test

      - name: Run Java sample smoke implementations
        shell: bash
        env:
          GIT_HARNESS_CLI: ${{ matrix.os == 'windows-latest' && './bin/git-harness-cli.exe' || './bin/git-harness-cli' }}
        run: |
          cd wrappers/java
          mvn -Dtest=SampleRepoFlowSmoke,SampleSafetyFlowSmoke test
